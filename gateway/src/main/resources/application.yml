server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

      routes:
        - id: payments-service
          uri: http://payments-service:8081
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=0

        - id: orders-service
          uri: http://orders-service:8082
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0

        - id: payments-swagger-ui
          uri: http://payments-service:8081
          predicates:
            - Path=/payments/**
          filters:
            - RewritePath=/payments/(?<segment>.*), /${segment}

        - id: orders-swagger-ui
          uri: http://orders-service:8082
          predicates:
            - Path=/orders/**
          filters:
            - RewritePath=/orders/(?<segment>.*), /${segment}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG